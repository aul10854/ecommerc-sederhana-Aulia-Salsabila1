<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produk Baju</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: flex;
      gap: 20px;
    }

    .product-image img {
      width: 300px;
      border-radius: 10px;
    }

    .product-details {
      flex: 1;
    }

    h1 {
      margin-top: 0;
    }

    .price {
      color: #e63946;
      font-size: 24px;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #1d3557;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }

    .btn:hover {
      background: #457b9d;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="product-image">
      <img src="https://via.placeholder.com/300x350" alt="Baju Kaos">
    </div>

    <div class="product-details">
      <h1>Baju Kaos Premium</h1>
      <p>Kaos berbahan katun premium yang nyaman dipakai sehari-hari. Cocok untuk gaya santai maupun formal casual.</p>
      
      <div class="price">Rp 120.000</div>

      <p><strong>Ukuran:</strong> S, M, L, XL</p>
      <p><strong>Warna:</strong> Hitam, Putih, Abu-abu</p>

      <a href="#" class="btn">Beli Sekarang</a>
    </div>

  </div>

</body>
</html>
