<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kontak - Bila Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #4f46e5;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #666;
    }

    .contact-box {
      margin-top: 30px;
    }

    .info {
      background: #f1f3ff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      color: #333;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    input, textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #3730a3;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Kontak Bila Store</h1>
    <p>Hubungi kami jika ada pertanyaan atau pemesanan</p>

    <div class="contact-box">

      <div class="info">
        📍 Alamat: Jl. barunagri No. 72, Indonesia
      </div>

      <div class="info">
        📞 WhatsApp: +62 83829876694
      </div>

      <div class="info">
        📧 Email: bilastore@email.com
      </div>

      <div class="info">
        ⏰ Jam Operasional: 08.00 - 21.00 WIB
      </div>

      <form>
        <input type="text" placeholder="nama" required>
        <input type="email" placeholder="email" required>
        <textarea rows="4" placeholder="pertanyaan" required></textarea>
        <button type="submit">Kirim Pesan</button>
      </form>

    </div>

    <div class="footer">
      © 2026 Bila Store. All Rights Reserved.
    </div>
  </div>

</body>
</html>
