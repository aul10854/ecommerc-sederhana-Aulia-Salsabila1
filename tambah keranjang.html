<body>

<h2> Produk Toko</h2>

<div class="product">
  <p>Nama: top lengan panjang</p>
  <p>Harga: Rp125.000</p>
  <button onclick="addToCart('top lengan panjang', 125.000)">Tambah</button>
</div>

<div class="product">
  <p>Nama: rok pendek</p>
  <p>Harga: Rp100.000</p>
  <button onclick="addToCart('rok pendek', 1000.000)">Tambah</button>
</div>

<div class="product">
  <p>Nama: kemeja</p>
  <p>Harga: Rp130.000</p>
  <button onclick="addToCart('kemeja', 130.000)">Tambah</button>
</div>

  <div class="product">
  <p>Nama: dress</p>
  <p>Harga: Rp130.000</p>
  <button onclick="addToCart('dress', 130.000)">Tambah</button>
</div>

  <div class="product">
  <p>Nama: tangtop</p>
  <p>Harga: Rp110.000</p>
  <button onclick="addToCart('tangtop', 130.000)">Tambah</button>
</div>

<h2>Keranjang</h2>
<div id="cart"></div>

<h3 id="total">Total: Rp0</h3>

<script>
  let cart = [];
  let total = 0;

  function addToCart(name, price) {
    cart.push({ name, price });
    total += price;
    renderCart();
  }

  function removeItem(index) {
    total -= cart[index].price;
    cart.splice(index, 1);
    renderCart();
  }

  function renderCart() {
    let cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";

    cart.forEach((item, index) => {
      cartDiv.innerHTML += `
        <p>
          ${item.name} - Rp${item.price}
          <button onclick="removeItem(${index})">Hapus</button>
        </p>
      `;
    });

    document.getElementById("total").innerText = "Total: Rp" + total;
  }
</script>

</body>
</html>
